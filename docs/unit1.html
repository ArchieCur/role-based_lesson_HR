<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDC HR Buddy — Unit 1: The Morning Message</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.desktop{width:1440px;height:900px;background:#1e3a6b;position:relative;overflow:hidden;transform-origin:center center;transition:background 1.2s ease}
.desktop.eod{background:#111e35}

/* Progress */
.prog{position:absolute;top:0;left:0;right:0;height:26px;background:rgba(0,0,0,0.4);display:flex;align-items:center;padding:0 14px;z-index:90;gap:8px}
.prog-txt{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:.04em}
.prog-dots{display:flex;gap:5px}
.prog-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .5s}
.prog-dot.on{background:#fff}
.prog-dot.done{background:#2563eb}

/* Taskbar */
.taskbar{position:absolute;bottom:0;left:0;right:0;height:44px;background:#0d1117;display:flex;align-items:center;padding:0 6px;z-index:80;border-top:1px solid #1e293b}
.tb-start{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px}
.tb-start:hover{background:rgba(255,255,255,0.08)}
.tb-search{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;height:28px;display:flex;align-items:center;padding:0 10px;gap:6px;color:rgba(255,255,255,0.45);font-size:12px;margin:0 4px;width:180px;flex-shrink:0}
.tb-apps{display:flex;gap:1px;margin:0 6px;flex:1}
.tb-app{width:38px;height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.tb-app.act::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:14px;height:2px;background:#2563eb;border-radius:2px}
.tb-tray{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 8px}
.tb-time{color:rgba(255,255,255,0.75);font-size:11px;text-align:right;line-height:1.4}

/* Windows */
.win{position:absolute;background:#fff;border:1px solid #aaa;box-shadow:0 6px 28px rgba(0,0,0,0.5);display:flex;flex-direction:column;transition:opacity .5s ease}
.win.top{box-shadow:0 10px 44px rgba(0,0,0,0.65);border-color:#999}
.win.dimmed{opacity:.25;pointer-events:none}
.win.eod-dim{opacity:.18;pointer-events:none}
.tbar{height:30px;display:flex;align-items:center;padding:0 4px;gap:4px;flex-shrink:0;user-select:none}
.tbar-ico{width:15px;height:15px;border-radius:2px;flex-shrink:0}
.tbar-ttl{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:2px}
.tbar-btns{display:flex;margin-left:auto}
.tbb{width:36px;height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;color:#555}
.tbb:hover{background:#e5e7eb}
.tbb.cl:hover{background:#c42b1c;color:#fff}

/* Teams layout */
.teams-layout{display:flex;flex:1;overflow:hidden}
.teams-sidebar{width:46px;background:#201f42;display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0}
.ts-item{width:38px;height:38px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.55);font-size:9px;gap:2px;position:relative}
.ts-item.act{color:#fff}
.ts-item.act::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:#7c7dff;border-radius:0 2px 2px 0}
.ts-badge{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:#dc2626;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.teams-panel{width:190px;background:#f3f2f1;border-right:1px solid #e1dfdd;display:flex;flex-direction:column;flex-shrink:0}
.teams-panel-hdr{padding:7px 10px;font-size:13px;font-weight:600;color:#111;border-bottom:1px solid #e1dfdd}
.teams-search{margin:5px 8px;background:#fff;border:1px solid #d1d1d1;padding:4px 8px;font-size:11px;color:#666;border-radius:3px}
.tc-row{padding:6px 10px;border-bottom:1px solid #ece9e8;display:flex;gap:8px;align-items:flex-start;cursor:pointer}
.tc-row:hover,.tc-row.active{background:#edebe9}
.tc-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.tc-name{font-size:11px;font-weight:600;color:#111;display:flex;justify-content:space-between}
.tc-time-sm{font-size:9px;color:#888;font-weight:400}
.tc-preview{font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tc-unread{width:14px;height:14px;border-radius:50%;background:#dc2626;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.teams-chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tc-chat-hdr{background:#fff;border-bottom:1px solid #e5e7eb;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tc-tabs{display:flex;gap:12px;font-size:11px;color:#888;margin-left:8px}
.tc-tabs span:first-child{color:#5b5fc7;border-bottom:2px solid #5b5fc7;padding-bottom:2px;font-weight:600}
.tc-body{flex:1;overflow:hidden;padding:10px 12px;display:flex;flex-direction:column;gap:10px;background:#fafafa}
.tc-day{text-align:center;font-size:10px;color:#aaa;display:flex;align-items:center;gap:8px}
.tc-day::before,.tc-day::after{content:'';flex:1;height:1px;background:#e5e7eb}
.tc-msg{display:flex;gap:8px}
.tc-msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-top:2px}
.tc-msg-who{font-size:12px;font-weight:600;color:#111}
.tc-msg-when{font-size:10px;color:#aaa;margin-left:6px}
.tc-bubble{border-radius:0 6px 6px 6px;padding:7px 10px;font-size:12px;color:#333;line-height:1.5;background:#fff;border:1px solid #e5e7eb;margin-top:3px}
.tc-bubble.urgent{border-left:3px solid #d97706;background:#fffbeb}
.tc-bubble.key{border-left:3px solid #5b5fc7;background:#f5f5ff}
.tc-bubble.success{border-left:3px solid #059669;background:#f0fdf4}
.tc-input-area{border-top:1px solid #e5e7eb;padding:6px 10px;background:#fff;flex-shrink:0}
.tc-input-box{border:1px solid #e5e7eb;border-radius:4px;padding:6px 10px;font-size:12px;color:#aaa;display:flex;align-items:center;gap:8px}
.tc-toolbar{display:flex;gap:8px;padding:4px 10px;border-top:1px solid #f0f0f0}
.tc-tb-btn{font-size:11px;color:#aaa;cursor:pointer}

/* HelpGate */
.hg-subnav{background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:3px 10px;display:flex;gap:12px;font-size:10px;color:#888;flex-shrink:0}
.hg-subnav span:first-child{color:#7a1e2e;font-weight:700;border-bottom:2px solid #7a1e2e;padding-bottom:1px}
.hg-filter-row{padding:4px 8px;border-bottom:1px solid #e5e7eb;background:#fff;display:flex;gap:6px;flex-shrink:0}
.hg-srch{flex:1;border:1px solid #d1d5db;font-size:10px;padding:3px 7px;color:#555}
.hg-filter-btn{background:#7a1e2e;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;cursor:pointer;border:none}
.hg-thead{display:grid;grid-template-columns:14px 1fr 60px;padding:3px 8px;background:#f0f0f0;font-size:9px;font-weight:700;color:#555;border-bottom:1px solid #d1d5db;flex-shrink:0}
.hg-rows{flex:1;overflow:hidden}
.hg-row{display:grid;grid-template-columns:14px 1fr 60px;padding:4px 8px;border-bottom:1px solid #f0f0f0;font-size:10px;color:#333;align-items:center;min-height:24px}
.hg-row.urg{background:#fef2f2}
.hg-chk{width:10px;height:10px;border:1px solid #d1d5db;border-radius:1px}
.hg-pill{font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;text-align:center}
.hg-pill.U{background:#dc2626;color:#fff}
.hg-pill.O{background:#e5e7eb;color:#374151}
.hg-pill.P{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.hg-pill.R{background:#d1fae5;color:#065f46}
.hg-note{font-size:9px;color:#dc2626;margin-top:1px}
.hg-artifact{font-size:9px;color:#dc2626;opacity:.45;font-style:italic}

/* CP360 */
.cp-toolbar{background:#2d4a7a;color:#fff;padding:2px 8px;font-size:9px;display:flex;gap:14px;flex-shrink:0}
.cp-toolbar span{opacity:.8;cursor:pointer}
.cp-toolbar span:first-child{opacity:1;font-weight:700}
.cp-sub{display:flex;font-size:9px;background:#1e3a6b;flex-shrink:0}
.cp-sub span{color:rgba(255,255,255,.6);padding:2px 10px;cursor:pointer}
.cp-sub span:first-child{background:rgba(255,255,255,.15);color:#fff;font-weight:600}
.cp-filter{padding:3px 8px;background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;gap:6px;flex-shrink:0}
.cp-filter input{flex:1;border:1px solid #d1d5db;font-size:9px;padding:2px 6px;color:#555}
.cp-filter button{background:#2d4a7a;color:#fff;border:none;font-size:9px;padding:2px 10px;cursor:pointer}
.cp-thead{display:grid;grid-template-columns:1fr 50px 80px 70px 50px;padding:3px 8px;background:#e8eef5;font-size:9px;font-weight:700;color:#374151;border-bottom:1px solid #c8d5e5;flex-shrink:0}
.cp-row{display:grid;grid-template-columns:1fr 50px 80px 70px 50px;padding:3px 8px;font-size:10px;color:#333;border-bottom:1px solid #f0f0f0}
.cp-row:nth-child(even){background:#f0f4fa}
.cp-row .pend{color:#d97706;font-weight:500}
.cp-row .actv{color:#059669}
.cp-row .mono{font-family:'Consolas',monospace;font-size:9px;color:#6b7280}
.cp-error{position:absolute;top:38%;left:30%;background:#fff;border:1px solid #d1d5db;box-shadow:0 3px 14px rgba(0,0,0,.3);padding:12px 14px;width:195px;z-index:10}
.cp-err-ttl{font-size:11px;font-weight:700;color:#dc2626;margin-bottom:6px}
.cp-err-body{font-size:10px;color:#374151;line-height:1.5;margin-bottom:10px}
.cp-err-btn{background:#2d4a7a;color:#fff;border:none;font-size:10px;padding:3px 14px;cursor:pointer}

/* Sticky */
.sticky{position:absolute;background:#fef08a;padding:10px;box-shadow:2px 5px 14px rgba(0,0,0,.3);transform:rotate(1.3deg);z-index:50;transition:opacity .5s ease}
.sticky-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#92400e;margin-bottom:6px;display:flex;justify-content:space-between}
.sticky-body{font-size:11px;line-height:1.6;color:#374151}

/* File icons */
.file-icons-group{position:absolute;left:10px;bottom:52px;display:flex;flex-direction:column;gap:6px;transition:opacity .5s ease}
.file-ico{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;border-radius:4px;border:2px solid transparent;transition:border-color .2s,box-shadow .2s,transform .15s,background .2s}
.file-ico-img{width:40px;height:48px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border-radius:2px;flex-shrink:0}
.file-ico-name{font-size:9px;color:rgba(255,255,255,.9);text-align:center;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,.6);word-break:break-all;max-width:62px}
.file-ico.selectable{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);animation:pulse-border 2s ease-in-out infinite}
.file-ico.selectable:hover{border-color:#fff;background:rgba(255,255,255,.15);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.file-ico.selected{border-color:#2563eb;background:rgba(37,99,235,.18);box-shadow:0 0 0 3px rgba(37,99,235,.35),0 6px 20px rgba(0,0,0,.4);transform:translateY(-2px)}

@keyframes pulse-border{0%,100%{border-color:rgba(255,255,255,.35)}50%{border-color:rgba(255,255,255,.7)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* HR Buddy */
.hrb-dock{position:absolute;top:26px;right:0;width:255px;bottom:44px;display:flex;flex-direction:column;background:#fff;border-left:1px solid #d0d9e8;box-shadow:-3px 0 20px rgba(37,99,235,.1);z-index:40;transition:box-shadow .4s,opacity .5s}
.hrb-dock.deciding{box-shadow:-3px 0 30px rgba(37,99,235,.3)}
.hrb-dock.eod-dim{opacity:.18;pointer-events:none}
.hrb-tbar{height:30px;background:#fff;border-bottom:1px solid #e0ecff;display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0}
.hrb-tbar-title{font-size:12px;font-weight:600;color:#111;flex:1}
.hrb-tbar-btns{display:flex;gap:4px;color:#888;font-size:12px}
.hrb-tbar-btns span{cursor:pointer;padding:2px 4px}
.hrb-body{flex:1;background:linear-gradient(180deg,#e8f0fe 0%,#f0f4ff 40%,#eef2fb 100%);display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow:hidden}
.hrb-identity{display:flex;flex-direction:column;gap:6px}
.hrb-big-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:700;padding:3px 14px;border-radius:4px;align-self:flex-end}
.hrb-big-name{font-size:16px;font-weight:700;color:#111}
.hrb-bubble{background:#fff;border-radius:0 8px 8px 8px;padding:10px 12px;font-size:12px;line-height:1.55;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.hrb-decision-prompt{background:rgba(255,255,255,.85);border:1px solid #bfdbfe;border-radius:4px;padding:10px 12px;text-align:center}
.hrb-decision-prompt p{font-size:11px;color:#6b7280;font-style:italic;margin-bottom:2px}
.hrb-decision-prompt strong{font-size:13px;color:#1e3a6b;display:block;margin-bottom:6px}
.hrb-upload-zone{border:2px dashed #9dc0f5;border-radius:6px;padding:14px 10px;text-align:center;background:rgba(255,255,255,.55);cursor:pointer;transition:border-color .2s,background .2s}
.hrb-upload-zone:hover{border-color:#2563eb;background:rgba(255,255,255,.8)}
.hrb-upload-zone.active{border-color:#2563eb;background:rgba(255,255,255,.9);border-style:solid}
.hrb-upload-ico{font-size:20px;color:#7ab4f5;display:block;margin-bottom:4px}
.hrb-upload-txt{font-size:11px;color:#555;line-height:1.4}
.hrb-staged{display:flex;flex-direction:column;gap:4px;padding:6px 0}
.hrb-staged-file{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #e0ecff;border-radius:3px;padding:4px 8px;font-size:11px;color:#1f2937}
.hrb-staged-file-ico{width:16px;height:16px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.hrb-upload-btn{width:100%;background:#2563eb;color:#fff;border:none;font-size:12px;font-weight:600;padding:8px;border-radius:3px;cursor:pointer;margin-top:6px;transition:background .15s}
.hrb-upload-btn:hover{background:#1d4ed8}
.hrb-upload-btn:disabled{background:#9ca3af;cursor:not-allowed}
.hrb-footer{border-top:1px solid #e5e7eb;background:#fff;padding:6px 8px;flex-shrink:0}
.hrb-inp-wrap{border:1px solid #d1d5db;border-radius:4px;padding:5px 8px;display:flex;align-items:center;gap:6px;background:#fff;transition:border-color .2s}
.hrb-inp-wrap.clickable{cursor:pointer;border-color:#9dc0f5}
.hrb-inp-wrap.clickable:hover{border-color:#2563eb;background:#f8fbff}
.hrb-inp{flex:1;font-size:12px;color:#aaa;border:none;outline:none;background:transparent;cursor:inherit}
.hrb-inp-row2{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 0;font-size:12px;color:#aaa}
.hrb-ask-hint{font-size:10px;color:#2563eb;text-align:center;margin-top:3px;font-style:italic;animation:fadein .5s ease}

/* Toast */
.toast-zone{position:absolute;bottom:50px;right:4px;width:248px;display:flex;flex-direction:column;gap:5px;z-index:75;transition:opacity .5s}
.toast-card{background:#1c2535;border:1px solid #2d3f55;border-radius:5px;padding:8px 10px;color:#fff}
.toast-app-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.toast-app-ico{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.toast-app-name{font-size:10px;font-weight:700;color:#d1d5db}
.toast-x{margin-left:auto;color:#6b7280;font-size:10px;cursor:pointer}
.toast-msg{font-size:11px;color:#e5e7eb;line-height:1.4}

/* ── END OF DAY OVERLAY ── */
.eod-overlay{position:absolute;inset:0;background:rgba(4,8,20,0.72);z-index:55;animation:fadein .8s ease;display:flex;align-items:center;justify-content:center}
/* Consequence card */
.consequence-card{background:#fff;border:1px solid #2a3a5c;box-shadow:0 12px 56px rgba(0,0,0,.7);width:520px;border-radius:2px;overflow:hidden;animation:slidein .5s ease}
.csq-header{padding:16px 20px 14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:12px}
.csq-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.csq-header-text{flex:1}
.csq-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:3px}
.csq-title{font-size:17px;font-weight:600;color:#111827}
.csq-time{font-size:11px;color:#9ca3af;margin-top:2px}
.csq-body{padding:16px 20px}
.csq-transcript{background:#f8f9fa;border-left:3px solid #374151;padding:12px 14px;font-size:13px;color:#374151;line-height:1.6;font-style:italic;margin-bottom:14px;border-radius:0 4px 4px 0}
.csq-transcript.legal{border-color:#dc2626;background:#fef9f9}
.csq-transcript.good{border-color:#059669;background:#f0fdf4}
.csq-transcript.info{border-color:#2563eb;background:#f0f7ff}
.csq-detail{font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:14px}
.csq-cta{width:100%;background:#1e3a6b;color:#fff;border:none;font-size:13px;font-weight:500;padding:11px 18px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.csq-cta:hover{background:#2a4d8f}

/* ── END-OF-DAY DEBRIEF OVERLAY ── */
.debrief-overlay{position:absolute;inset:0;background:rgba(4,8,20,0.88);z-index:60;display:flex;align-items:center;justify-content:center;animation:fadein .4s ease}
.debrief-card{background:#fffef7;border-left:4px solid #1e3a6b;box-shadow:0 12px 56px rgba(0,0,0,.7);padding:26px 30px;width:560px;max-height:620px;overflow-y:auto;animation:slidein .4s ease}
/* Opening screen */
.opening-screen{position:fixed;inset:0;background:#1e3a6b;z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.opening-card{background:#fffef7;border-left:4px solid #2563eb;box-shadow:0 12px 56px rgba(0,0,0,.7);padding:32px 36px;width:100%;max-width:640px;border-radius:2px}
.op-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#6b7280;margin-bottom:16px}
.op-body{font-size:14px;line-height:1.8;color:#1f2937}.op-body p{margin-bottom:14px}
.op-quote{border-left:3px solid #93c5fd;padding:10px 14px;margin:4px 0 14px;background:#f0f7ff;font-size:13px;line-height:1.7;color:#1e3a6b;font-style:italic}

            <div className="mob-db-body">{db.body}</div>
            <div className="mob-db-reinf">{db.reinf}</div>
            <div className="mob-carry">
              <div className="mob-carry-ttl">Three things to carry into Unit 2</div>
              {db.carry.map((c,i)=><div key={i} className="mob-carry-item"><div className="mob-carry-dot"/>{c}</div>)}
            </div>
            <button className="mob-cont-btn" onClick={onReset}>Continue to Unit 2 →</button>
          </div>
        )}

      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [screen,setScreen]=useState('opening');
  const [selected,setSelected]=useState([]);
  const [choice,setChoice]=useState(null);
  const [cpErr,setCpErr]=useState(true);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=768);
  const stageRef=useRef(null);
  const deskRef=useRef(null);

  useEffect(()=>{
    function scale(){
      if(!stageRef.current||!deskRef.current)return;
      const s=Math.min(stageRef.current.clientWidth/1440,stageRef.current.clientHeight/900);
      deskRef.current.style.transform=`scale(${s})`;
    }
    function checkMobile(){setIsMobile(window.innerWidth<=768)}
    scale();
    checkMobile();
    window.addEventListener('resize',scale);
    window.addEventListener('resize',checkMobile);
    return()=>{window.removeEventListener('resize',scale);window.removeEventListener('resize',checkMobile)};
  },[]);

  function toggleFile(key){setSelected(prev=>prev.includes(key)?prev.filter(k=>k!==key):[...prev,key])}

  // Desktop upload: infer from selected files
  function handleUpload(){
    setChoice(selected.includes('csv')?'A':'B');
    setScreen('consequence');
  }

  // Mobile upload: branch passed directly from tile choice
  function handleMobileUpload(branch){setChoice(branch);setScreen('consequence');}

  function handleAskFirst(){setChoice('C');setScreen('consequence')}
  function handleRevealDebrief(){setScreen('debrief')}
  function handleReset(){setScreen('scene');setSelected([]);setChoice(null);setCpErr(true)}

  const deciding=screen==='deciding';
  const isEod=screen==='consequence'||screen==='debrief';
  const d=choice?DEBRIEF[choice]:null;

  // CSS classes for dimming
  const sceneDim = deciding ? 'dimmed' : isEod ? 'eod-dim' : '';
  const stickyDim = deciding ? 'dimmed' : isEod ? '' : '';
  const filesDim = isEod ? 'eod-dim' : '';
  const hrbDim = isEod ? 'eod-dim' : '';
  const toastDim = isEod ? 'eod-dim' : '';
  const eodMessages = choice==='B';
  const eodHelpGate = isEod;
  const clockTime = isEod ? (choice==='A'?'5:47 PM':choice==='B'?'4:58 PM':'10:51 AM') : '8:47 AM';

  return(
    <div className="stage" ref={stageRef}>

      {/* ── OPENING SCREEN ── */}
      {screen==='opening'&&(
        <div className="opening-screen">
          <div className="opening-card">
            <div className="op-eyebrow">Unit 1 of 3 — The Data Inside the Form</div>
            <div className="op-body">
              <p>It's October 14th. Open enrollment opens in three days.</p>
              <p>You are Jamie, an HR Coordinator at Meridian Dynamics Corporation. You've been managing open enrollment for four years. You know what's coming — the flood of "which plan should I pick" tickets in HelpGate, the employees who can't find their dependent verification docs, the managers who forward questions they should be answering themselves.</p>
              <p>This year is different. IT deployed HR Buddy, the new AI assistant, two months ago. Your manager sends a message at 8:47am:</p>
            </div>
            <div className="op-quote">"Jamie — HR Buddy can now compare plan PDFs and answer benefits questions. I want to use it to handle the enrollment volume this year. Can you get it set up to answer employee questions about OptiEnroll Hub? Would save us a ton of time."</div>
            <div className="op-body">
              <p>You open HR Buddy. It's asking you to upload documents to get started.</p>
              <p>You have two files open on your desktop:</p>
            </div>
            <div className="op-files">
              <div className="op-files-row">
                <div className="op-file-badge" style={{background:'#dc2626'}}>PDF</div>
                <div><strong>MDC_Benefits_2026_Summary.pdf</strong> — the plan comparison document from OptiEnroll Hub. Includes HDHP vs PPO premium tables, HSA contribution limits, and coverage tiers.</div>
              </div>
              <div className="op-files-row">
                <div className="op-file-badge" style={{background:'#059669'}}>CSV</div>
                <div><strong>CorePeople360_Enrollment_Export_Oct14.csv</strong> — a roster export you pulled this morning to check who hasn't completed dependent verification. Contains employee names, SSNs (partial), DOB, enrollment status, and dependent information.</div>
              </div>
            </div>
            <div className="op-cta">HR Buddy is waiting. What do you upload?</div>
            <button className="op-btn" onClick={()=>setScreen('scene')}>Enter the scenario →</button>
          </div>
        </div>
      )}

      {/* ── MOBILE LAYOUT ── */}
      {isMobile&&(
        <MobileLayout
          screen={screen}
          selected={selected}
          choice={choice}
          onBeginDecide={()=>setScreen('deciding')}
          onToggle={toggleFile}
          onUpload={handleMobileUpload}
          onAskFirst={handleAskFirst}
          onRevealDebrief={()=>setScreen('debrief')}
          onReset={handleReset}
        />
      )}

      {/* ── DESKTOP LAYOUT ── */}
      <div className={`desktop ${isEod?'eod':''}`} ref={deskRef}>

        {/* Progress */}
        <div className="prog">
          <img src="assets/mdc-logo.png" style={{width:18,height:18,opacity:.9,flexShrink:0}} alt="MDC"/>
          <div className="prog-txt">Unit 1 of 3 — The Data Inside the Form</div>
          <div className="prog-dots">
            <div className="prog-dot on"/>
            <div className={`prog-dot ${deciding||isEod?'on':''}`}/>
            <div className={`prog-dot ${isEod?'on':''}`}/>
          </div>
        </div>

        {/* Recycle bin */}
        <div style={{position:'absolute',top:34,left:10,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:5,borderRadius:3,cursor:'pointer',opacity:deciding||isEod?.15:1,transition:'opacity .5s',pointerEvents:deciding||isEod?'none':'auto'}}>
          <div style={{fontSize:20}}>🗑</div>
          <div style={{fontSize:9,color:'rgba(255,255,255,.8)',textShadow:'0 1px 2px rgba(0,0,0,.6)'}}>Recycle Bin</div>
        </div>

        <TeamsWin dimCls={sceneDim} eodMessages={eodMessages}/>
        <HelpGateWin dimCls={sceneDim} eodMode={eodHelpGate}/>
        <CP360Win dimCls={sceneDim} showErr={cpErr} onDismiss={()=>setCpErr(false)}/>

        {/* Sticky */}
        <div className={`sticky ${stickyDim}`} style={{left:672,top:290,width:158,opacity:deciding?.25:isEod?.1:1,transition:'opacity .5s',pointerEvents:deciding||isEod?'none':'auto'}}>
          <div className="sticky-hdr">Notes <span>✕</span></div>
          <div className="sticky-body">Jamie's notes:<br/>OE starts Friday! Check CorePeople360 feed, verify HelpGate queue. Marcus needs updates.</div>
        </div>

        <FileIcons deciding={deciding} selected={selected} onToggle={toggleFile} dimCls={filesDim}/>

        <HRBuddySidebar deciding={deciding} selected={selected} onBeginDecide={()=>setScreen('deciding')} onUpload={handleUpload} onAskFirst={handleAskFirst} dimCls={hrbDim}/>

        <ToastOverlay dimCls={toastDim}/>
        <Taskbar time={clockTime}/>

        {/* Consequence overlay — end of day */}
        {screen==='consequence'&&choice&&(
          <ConsequenceOverlay choice={choice} onRevealDebrief={handleRevealDebrief}/>
        )}

        {/* Debrief overlay */}
        {screen==='debrief'&&d&&(
          <div className="debrief-overlay">
            <div className="debrief-card">
              <div className="db-eyebrow">What just happened · Unit 1 of 3</div>
              <div className="db-heading">{d.label}</div>
              <div className="db-body">{d.content}</div>
              <div className="db-reinf">{d.reinf}</div>
              <div className="carry">
                <div className="carry-ttl">Three things to carry into Unit 2</div>
                {d.carry.map((c,i)=><div key={i} className="carry-item"><div className="carry-dot"/>{c}</div>)}
              </div>
              <div className="cont-btn" onClick={()=>window.location.href='unit2.html'}>Continue to Unit 2 →</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
