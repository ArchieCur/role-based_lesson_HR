<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDC HR Buddy — Unit 3: The Audit Trail</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.desktop{width:1440px;height:900px;background:#1e3a6b;position:relative;overflow:hidden;transform-origin:center center;transition:background 1.2s ease}
.desktop.eod{background:#111e35}
.desktop.journey-bg{background:#0a1628}

/* Transition */
.tr-screen{position:absolute;inset:0;background:#060e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;cursor:pointer}
.tr-label{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.tr-date{font-size:52px;font-weight:700;color:#fff;letter-spacing:.02em}
.tr-time{font-size:22px;color:rgba(255,255,255,.5);margin-top:8px;letter-spacing:.05em}
.tr-divider{width:1px;height:50px;background:rgba(255,255,255,.12);margin:22px 0}
.tr-unit{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:5px}
.tr-title{font-size:24px;font-weight:600;color:rgba(255,255,255,.85)}
.tr-skip{font-size:11px;color:rgba(255,255,255,.2);margin-top:36px}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Progress */
.prog{position:absolute;top:0;left:0;right:0;height:26px;background:rgba(0,0,0,.4);display:flex;align-items:center;padding:0 14px;z-index:90;gap:8px}
.prog-txt{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.04em}
.prog-dots{display:flex;gap:5px}
.prog-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .5s}
.prog-dot.on{background:#fff}.prog-dot.done{background:#2563eb}

/* Taskbar */
.taskbar{position:absolute;bottom:0;left:0;right:0;height:44px;background:#0d1117;display:flex;align-items:center;padding:0 6px;z-index:80;border-top:1px solid #1e293b}
.tb-start{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px}
.tb-search{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:4px;height:28px;display:flex;align-items:center;padding:0 10px;gap:6px;color:rgba(255,255,255,.45);font-size:12px;margin:0 4px;width:180px;flex-shrink:0}
.tb-apps{display:flex;gap:1px;margin:0 6px;flex:1}
.tb-app{width:38px;height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative}
.tb-app.act::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:14px;height:2px;background:#2563eb;border-radius:2px}
.tb-tray{margin-left:auto;display:flex;align-items:center;gap:8px;padding:0 8px}
.tb-time{color:rgba(255,255,255,.75);font-size:11px;text-align:right;line-height:1.4}

/* Windows */
.win{position:absolute;background:#fff;border:1px solid #aaa;box-shadow:0 6px 28px rgba(0,0,0,.5);display:flex;flex-direction:column;transition:opacity .5s ease}
.win.top{box-shadow:0 10px 44px rgba(0,0,0,.65)}
.win.dimmed{opacity:.22;pointer-events:none}
.win.eod-dim{opacity:.15;pointer-events:none}
.tbar{height:30px;display:flex;align-items:center;padding:0 4px;gap:4px;flex-shrink:0;user-select:none}
.tbar-ico{width:15px;height:15px;border-radius:2px;flex-shrink:0}
.tbar-ttl{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:2px}
.tbar-btns{display:flex;margin-left:auto}
.tbb{width:36px;height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;color:#555}
.tbb:hover{background:#e5e7eb}.tbb.cl:hover{background:#c42b1c;color:#fff}

/* Teams */
.teams-layout{display:flex;flex:1;overflow:hidden}
.teams-sidebar{width:46px;background:#201f42;display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0}
.ts-item{width:38px;height:38px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);font-size:9px;gap:2px;position:relative}
.ts-item.act{color:#fff}
.ts-item.act::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:#7c7dff;border-radius:0 2px 2px 0}
.ts-badge{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:#dc2626;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.teams-panel{width:190px;background:#f3f2f1;border-right:1px solid #e1dfdd;display:flex;flex-direction:column;flex-shrink:0}
.tc-row{padding:6px 10px;border-bottom:1px solid #ece9e8;display:flex;gap:8px;align-items:flex-start;cursor:pointer}
.tc-row.active{background:#edebe9}
.tc-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.tc-name{font-size:11px;font-weight:600;color:#111;display:flex;justify-content:space-between}
.tc-time-sm{font-size:9px;color:#888;font-weight:400}
.tc-preview{font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.tc-unread{width:14px;height:14px;border-radius:50%;background:#dc2626;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.teams-chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tc-chat-hdr{background:#fff;border-bottom:1px solid #e5e7eb;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tc-body{flex:1;overflow:hidden;padding:10px 12px;display:flex;flex-direction:column;gap:10px;background:#fafafa}
.tc-day{text-align:center;font-size:10px;color:#aaa;display:flex;align-items:center;gap:8px}
.tc-day::before,.tc-day::after{content:'';flex:1;height:1px;background:#e5e7eb}
.tc-msg{display:flex;gap:8px}
.tc-msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-top:2px}
.tc-msg-who{font-size:12px;font-weight:600;color:#111}
.tc-msg-when{font-size:10px;color:#aaa;margin-left:6px}
.tc-bubble{border-radius:0 6px 6px 6px;padding:7px 10px;font-size:12px;color:#333;line-height:1.5;background:#fff;border:1px solid #e5e7eb;margin-top:3px}
.tc-bubble.key{border-left:3px solid #5b5fc7;background:#f5f5ff}
.tc-bubble.success{border-left:3px solid #059669;background:#f0fdf4}
.tc-cal-invite{border:1px solid #e5e7eb;border-radius:4px;padding:7px 10px;background:#f0f5ff;margin-top:4px;border-left:3px solid #2563eb}
.tc-cal-title{font-size:11px;font-weight:600;color:#1e3a6b}
.tc-cal-meta{font-size:10px;color:#6b7280;margin-top:2px}
.tc-input-area{border-top:1px solid #e5e7eb;padding:6px 10px;background:#fff;flex-shrink:0}
.tc-input-box{border:1px solid #e5e7eb;border-radius:4px;padding:6px 10px;font-size:12px;color:#aaa;display:flex;align-items:center}

/* Marcus workflow document */
.workflow-win{font-size:11px;color:#333}
.wf-toolbar{background:#f3f4f6;border-bottom:1px solid #e5e7eb;padding:4px 10px;display:flex;gap:12px;font-size:10px;color:#6b7280;flex-shrink:0}
.wf-body{padding:16px 18px;flex:1;overflow:hidden}
.wf-title{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
.wf-meta{font-size:10px;color:#9ca3af;margin-bottom:14px}
.wf-step{margin-bottom:12px;padding:8px 10px;border-radius:3px;border:1px solid #e5e7eb;background:#f9fafb}
.wf-step.problem{border-color:#fcd34d;background:#fffbeb}
.wf-step-num{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:4px}
.wf-step-text{font-size:11px;color:#374151;line-height:1.55}
.wf-step.problem .wf-step-text{color:#374151}
.wf-step-flag{font-size:9px;color:#d97706;margin-top:4px;font-style:italic;display:flex;gap:4px;align-items:center}

/* HR Buddy */
.hrb-dock{position:absolute;top:26px;right:0;width:255px;bottom:44px;display:flex;flex-direction:column;background:#fff;border-left:1px solid #d0d9e8;box-shadow:-3px 0 20px rgba(37,99,235,.1);z-index:40;transition:opacity .5s}
.hrb-dock.dimmed{opacity:.22;pointer-events:none}
.hrb-dock.eod-dim{opacity:.15;pointer-events:none}
.hrb-tbar{height:30px;background:#fff;border-bottom:1px solid #e0ecff;display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0}
.hrb-tbar-title{font-size:12px;font-weight:600;color:#111;flex:1}
.hrb-tbar-btns{display:flex;gap:4px;color:#888;font-size:12px}
.hrb-body{flex:1;background:linear-gradient(180deg,#e8f0fe,#f0f4ff 50%,#eef2fb);display:flex;flex-direction:column;padding:14px 12px;gap:10px;overflow:hidden}
.hrb-badge{background:#2563eb;color:#fff;font-size:11px;font-weight:700;padding:3px 14px;border-radius:4px;align-self:flex-end}
.hrb-bubble{background:#fff;border-radius:0 8px 8px 8px;padding:10px 12px;font-size:12px;line-height:1.55;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.hrb-status-ok{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:8px 10px;font-size:11px;color:#166534;display:flex;gap:6px;align-items:flex-start}
/* Testing state */
.hrb-test-header{background:#fff;border:1px solid #fcd34d;border-radius:4px;padding:7px 10px;font-size:11px;color:#92400e;margin-bottom:4px}
.hrb-test-output{background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:10px 12px;font-size:11px;color:#374151;line-height:1.6}
.hrb-test-output .flag{color:#dc2626;font-weight:600;border-top:1px solid #fee2e2;margin-top:8px;padding-top:8px}
.hrb-footer{border-top:1px solid #e5e7eb;background:#fff;padding:6px 8px;flex-shrink:0}
.hrb-inp-wrap{border:1px solid #d1d5db;border-radius:4px;padding:5px 8px;display:flex;align-items:center;gap:6px}
.hrb-inp{flex:1;font-size:12px;color:#aaa;border:none;outline:none;background:transparent}

/* Carry-forward */
.cf-card{position:absolute;background:#fff;border:1px solid #dbeafe;border-left:3px solid #2563eb;padding:10px 12px;width:196px;z-index:30;box-shadow:0 2px 10px rgba(0,0,0,.25);transition:opacity .5s}
.cf-card.dimmed{opacity:.15;pointer-events:none}
.cf-card-ttl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#2563eb;margin-bottom:6px}
.cf-item{display:flex;gap:5px;font-size:10px;color:#374151;margin-bottom:4px;line-height:1.4}
.cf-dot{width:4px;height:4px;border-radius:50%;background:#2563eb;flex-shrink:0;margin-top:4px}

/* Toast */
.toast-zone{position:absolute;bottom:50px;right:4px;width:248px;display:flex;flex-direction:column;gap:5px;z-index:75;transition:opacity .5s}
.toast-card{background:#1c2535;border:1px solid #2d3f55;border-radius:5px;padding:8px 10px;color:#fff}
.toast-app-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.toast-app-ico{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.toast-app-name{font-size:10px;font-weight:700;color:#d1d5db}
.toast-x{margin-left:auto;color:#6b7280;font-size:10px}
.toast-msg{font-size:11px;color:#e5e7eb;line-height:1.4}

/* Decision overlay */
.overlay{position:absolute;inset:0;background:rgba(8,18,36,.65);display:flex;align-items:center;justify-content:center;z-index:60}
.decision-card{background:#fff;border:1px solid #e5e7eb;box-shadow:0 10px 48px rgba(0,0,0,.55);padding:26px 30px;width:540px;border-radius:2px;animation:slidein .4s ease}
.dec-context{font-size:12px;color:#6b7280;font-style:italic;margin-bottom:4px}
.dec-title{font-size:18px;font-weight:600;color:#111827;margin-bottom:18px;line-height:1.3}
.dec-tiles{display:flex;flex-direction:column;gap:8px}
.d-tile{border:1px solid #d1d5db;border-radius:3px;padding:12px 14px;background:#fff;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:border-color .15s,box-shadow .15s}
.d-tile:hover{border-color:#2563eb;box-shadow:0 0 0 2px #eff6ff}
.d-tile__key{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.d-tile.a .d-tile__key{background:#fef2f2;color:#dc2626}
.d-tile.b .d-tile__key{background:#eff6ff;color:#2563eb}
.d-tile.c .d-tile__key{background:#f0fdf4;color:#059669}
.d-tile.d .d-tile__key{background:#fef2f2;color:#dc2626}
.d-tile.e .d-tile__key{background:#eff6ff;color:#2563eb}
.d-tile.f .d-tile__key{background:#f0fdf4;color:#059669}
.d-tile__icon{font-size:16px;flex-shrink:0;margin-top:1px}
.d-tile__main{font-size:13px;font-weight:500;color:#111;line-height:1.4}
.d-tile__sub{font-size:11px;color:#6b7280;font-weight:400;margin-top:2px}

/* Testing interstitial */
.testing-overlay{position:absolute;inset:0;background:rgba(8,18,36,.70);display:flex;align-items:center;justify-content:center;z-index:62;animation:fadein .4s ease}
.testing-card{background:#fff;border:1px solid #e5e7eb;box-shadow:0 10px 48px rgba(0,0,0,.55);padding:22px 26px;width:480px;border-radius:2px;animation:slidein .4s ease}
.testing-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:8px}
.testing-title{font-size:15px;font-weight:600;color:#111;margin-bottom:12px}
.testing-output{border:1px solid #e5e7eb;border-radius:3px;padding:12px 14px;background:#f9fafb;font-size:12px;color:#374151;line-height:1.7;margin-bottom:14px}
.testing-flag{background:#fef2f2;border:1px solid #fecaca;border-radius:3px;padding:10px 12px;font-size:12px;color:#111;line-height:1.6;margin-bottom:14px}
.testing-insight{font-size:12px;color:#374151;font-style:italic;margin-bottom:14px;line-height:1.6}
.testing-cta{background:#1e3a6b;color:#fff;border:none;font-size:12px;font-weight:600;padding:9px 20px;border-radius:3px;cursor:pointer}
.testing-cta:hover{background:#2a4d8f}

/* Teams meeting */
.meeting-overlay{position:absolute;inset:0;background:rgba(4,8,20,.80);display:flex;align-items:center;justify-content:center;z-index:65;animation:fadein .5s ease}
.meeting-window{width:760px;background:#1b1b2e;border-radius:4px;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,.8);display:flex;flex-direction:column;animation:slidein .4s ease}
.meeting-titlebar{background:#151526;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a4a}
.meeting-title-txt{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);flex:1}
.meeting-body{display:flex;flex:1}
.meeting-participants{flex:1;padding:20px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;background:#1b1b2e;justify-content:center}
.participant-tile{width:180px;height:130px;background:#252540;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px solid transparent;transition:border-color .3s}
.participant-tile.speaking{border-color:#2563eb}
.participant-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.participant-name{font-size:11px;color:rgba(255,255,255,.75);text-align:center}
.participant-role{font-size:9px;color:rgba(255,255,255,.4)}
.meeting-transcript{width:270px;background:#13132a;border-left:1px solid #2a2a4a;display:flex;flex-direction:column}
.transcript-hdr{padding:10px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);border-bottom:1px solid #2a2a4a;text-transform:uppercase;letter-spacing:.04em}
.transcript-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;max-height:280px}
.transcript-line{animation:slidein .3s ease}
.tl-who{font-size:10px;font-weight:700;margin-bottom:3px}
.tl-text{font-size:12px;color:rgba(255,255,255,.8);line-height:1.5}
.meeting-footer{background:#151526;padding:10px 20px;display:flex;align-items:center;gap:12px;border-top:1px solid #2a2a4a}
.meeting-status{font-size:11px;color:rgba(255,255,255,.4);flex:1}
.meeting-btn{background:#2563eb;color:#fff;border:none;font-size:12px;font-weight:600;padding:8px 18px;border-radius:3px;cursor:pointer}
.meeting-btn:hover{background:#1d4ed8}
.meeting-btn.end{background:#dc2626}

/* Follow-up message overlay */
.followup-overlay{position:absolute;inset:0;background:rgba(4,8,20,.72);display:flex;align-items:center;justify-content:center;z-index:60;animation:fadein .6s ease}
.followup-card{background:#fff;border:1px solid #e5e7eb;box-shadow:0 8px 40px rgba(0,0,0,.55);width:520px;border-radius:2px;overflow:hidden;animation:slidein .4s ease}
.followup-hdr{background:#201f42;padding:8px 14px;display:flex;align-items:center;gap:8px}
.followup-from{display:flex;gap:8px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.followup-body{padding:12px 16px 16px}
.followup-prompt{font-size:14px;font-weight:600;color:#111;margin-top:12px;margin-bottom:4px}
.followup-sub{font-size:12px;color:#6b7280;margin-bottom:16px}

/* Debrief */
.debrief-overlay{position:absolute;inset:0;background:rgba(4,8,20,.88);z-index:70;display:flex;align-items:center;justify-content:center;animation:fadein .4s ease}
.debrief-card{background:#fffef7;border-left:4px solid #1e3a6b;box-shadow:0 12px 56px rgba(0,0,0,.7);padding:26px 30px;width:580px;max-height:660px;overflow-y:auto;animation:slidein .4s ease}
/* Opening screen */
.opening-screen{position:fixed;inset:0;background:#1e3a6b;z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.opening-card{background:#fffef7;border-left:4px solid #2563eb;box-shadow:0 12px 56px rgba(0,0,0,.7);padding:32px 36px;width:100%;max-width:640px;border-radius:2px}
.op-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#6b7280;margin-bottom:16px}
.op-body{font-size:14px;line-height:1.8;color:#1f2937}.op-body p{margin-bottom:14px}
.op-quote{border-left:3px solid #93c5fd;padding:10px 14px;margin:4px 0 14px;background:#f0f7ff;font-size:13px;line-height:1.7;color:#1e3a6b;font-style:italic}
.op-files{background:#f9fafb;border:1px solid #e5e7eb;border-radius:3px;padding:14px 16px;margin:4px 0 14px;font-size:12.5px;line-height:1.7;color:#374151}
.op-files-row{display:flex;gap:8px;align-items:flex-start;padding:4px 0}.op-files-row+.op-files-row{border-top:1px solid #e5e7eb;margin-top:8px;padding-top:12px}
.op-file-badge{flex-shrink:0;width:28px;height:20px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;margin-top:2px}
.op-cta{font-size:15px;font-weight:700;color:#1e3a6b;margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb}
.op-btn{display:inline-block;background:#2563eb;color:#fff;font-size:14px;font-weight:600;padding:12px 28px;border-radius:3px;border:none;cursor:pointer;margin-top:12px;letter-spacing:.01em}

<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ── Participants (Unit 3 meeting: JR, ML, CD only) ── */
const PARTICIPANTS_U3 = [
  {id:'JR',name:'Jamie Rivera',role:'HR Coordinator',color:'#7c3aed'},
  {id:'ML',name:'Marcus L.',role:'HR Business Partner',color:'#4338ca'},
  {id:'CD',name:'Charles Douglas',role:'Legal Counsel',color:'#1e3a6b'},
];

/* ── Meeting dialogue ── */
const MEETING = {
  A:[
    {speaker:'ML',color:'#4338ca',text:"I've been piloting HR Buddy for termination documentation for two weeks. The results have been strong — here's a sample summary it generated."},
    {speaker:'ML',color:'#4338ca',text:"Step 3 is where the manager comes in. They review the summary HR Buddy produced and approve the termination rationale."},
    {speaker:'CD',color:'#1e3a6b',text:"Marcus, walk me through Step 3. What exactly is the manager approving?"},
    {speaker:'ML',color:'#4338ca',text:"The termination rationale. The summary HR Buddy generated."},
    {speaker:'CD',color:'#1e3a6b',text:"Is the manager reviewing the underlying documentation — the case history, the performance notes — or are they approving the AI's interpretation of that documentation?"},
    {speaker:'ML',color:'#4338ca',text:"... I built in the summary as the review step. I assumed that covered it."},
    {speaker:'CD',color:'#1e3a6b',text:"If a manager is approving an AI-generated termination rationale without independently reviewing the source documentation, the termination decision is being made by HR Buddy. The manager is approving the output, not the decision. In an employment termination, that distinction is the entire legal exposure."},
    {speaker:'JR',color:'#7c3aed',text:"The fix is in Step 3. The manager reviews both the HR Buddy summary and the source documentation. Their approval confirms they reviewed the underlying facts independently — not just that they agree with HR Buddy's framing."},
    {speaker:'ML',color:'#4338ca',text:"That's a fifteen-minute fix. I can revise the workflow now."},
    {speaker:'CD',color:'#1e3a6b',text:"Do that. The AI assists the process. The human makes the decision. Bring the revision back and we'll sign off."},
  ],
  B:[
    {speaker:'ML',color:'#4338ca',text:"Before we start — Jamie flagged something in the workflow this morning that I want to address up front. I revised Step 3 based on her input."},
    {speaker:'ML',color:'#4338ca',text:"Revised Step 3: The HRBP sends both the HR Buddy summary and the source documentation to the manager. Manager approval confirms they've independently reviewed the underlying facts — not just the AI summary."},
    {speaker:'CD',color:'#1e3a6b',text:"That's the right design. The AI assists. The human decides. And the manager's approval documents that they made an independent judgment, not just that they received an AI recommendation."},
    {speaker:'JR',color:'#7c3aed',text:"HR Buddy still saves the HRBP significant documentation time. The summary is still useful — it just isn't the only thing the manager sees."},
    {speaker:'CD',color:'#1e3a6b',text:"Exactly. Let me review the full workflow and we'll sign off. Good catch, Jamie."},
    {speaker:'ML',color:'#4338ca',text:"Agreed. Fifteen minutes of revision saved us a significant compliance exposure."},
  ],
  C:[
    {speaker:'ML',color:'#4338ca',text:"Jamie ran the workflow through HR Buddy this morning using fictional data. Based on what she saw, I revised Step 3 before the call."},
    {speaker:'JR',color:'#7c3aed',text:"HR Buddy doesn't produce a summary — it produces a recommendation. Three sentences at the end telling the HRBP what to do. A manager approving that isn't reviewing facts. They're endorsing a conclusion."},
    {speaker:'ML',color:'#4338ca',text:"Revised Step 3: Manager reviews both the HR Buddy output and the source documentation. Approval confirms independent review of the underlying facts."},
    {speaker:'CD',color:'#1e3a6b',text:"That's precisely right. The AI assists. The human decides. And the approval documents independent judgment."},
    {speaker:'CD',color:'#1e3a6b',text:"Jamie — testing the workflow with fictional data before the meeting. That's the instinct we need. You saw what the system actually produces, which is more informative than what the workflow document says it produces."},
    {speaker:'ML',color:'#4338ca',text:"Signing off on the revised workflow. Ready to roll out."},
  ],
};

const MEETING_SUMMARY = {
  A:'You raised concerns in the meeting. Legal caught the same problem. The workflow was revised — but Marcus walked in not knowing what was coming. The revision is right. The sequence could have been better.',
  B:'You messaged Marcus before the meeting. He revised the workflow. Legal signed off in 22 minutes. The fix happened before the problem became a meeting.',
  C:'You tested the workflow in HR Buddy first and could name the problem precisely: HR Buddy produces a recommendation, not a summary. The meeting was 22 minutes. Legal called it the right instinct.',
};

/* ── Debrief content ── */
const NODE2_DEBRIEF = {
  D:{heading:'Branch D — Documenting the AI\'s Work',
    body:<><p>The HR Buddy outputs are logged — timestamped, complete. Legal can see exactly what the AI produced for every step. But three months later, the wrongful termination claim arrives.</p><div className="db-callout">"We can show the AI's work. We can't show the manager's independent judgment. In a wrongful termination claim, the human decision is what we need to defend — and we don't have documentation that a human decision was actually made."</div><p>Documenting what the AI produced is necessary. It's not sufficient. The AI's output is context. The human decision is the event — and the audit trail has to prove that a human independently reviewed the facts and made a judgment.</p></>,
    reinf:"An audit trail that documents what the AI produced without documenting what the human independently reviewed is half an audit trail. In employment decisions, the half that's missing is the half that matters most.",
  },
  E:{heading:'Branch E — Documenting the Human Review',
    body:<><p>The manager sign-off confirmations are there — signed, timestamped. Legal can prove the human reviewed the facts. But three months later:</p><div className="db-callout">"What did HR Buddy actually recommend? We need to know what the AI contributed — in case opposing counsel argues the AI recommendation influenced the manager's review."</div><p>The HR Buddy outputs weren't logged. Legal can prove the human reviewed the facts. They can't show what the AI produced — which means they can't demonstrate that the manager's decision was independent of the AI's framing.</p></>,
    reinf:"Documenting the human decision without documenting the AI's contribution leaves a different gap. A complete audit trail shows both — what the AI produced and what the human independently decided — so the relationship between them is transparent and defensible.",
  },
  F:{heading:'Branch F — The Complete Audit Trail',
    body:<><p>Three months later, the wrongful termination claim arrives. Legal pulls the audit trail.</p><div className="db-callout good">"This is exactly what we need. The AI assisted. The human decided. And we can prove it."</div><p>The complete sequence is there: HR Buddy's output, the manager's independent document review confirmed in writing, the approval timestamped after the review. The AI's contribution and the human's judgment documented separately and in sequence.</p><p>You understood that an AI-assisted workflow creates a documentation requirement that didn't exist before. The question isn't just "did a human approve this?" It's "can we prove the human's approval was based on independent judgment rather than AI endorsement?"</p></>,
    reinf:"In an AI-assisted employment workflow, the audit trail has to prove two things independently: what the AI contributed, and that the human decision was genuinely independent of that contribution. One without the other is half a defense.",

    <div className="tbar" style={{background:bg,borderBottom:`1px solid ${bg==='#f3f4f6'?'#d1d5db':'rgba(0,0,0,0.25)'}`}}>

          <div key={i} className="mob-journey-instinct">
            <div className="mob-journey-num">{i+1}</div>
            <div className="mob-journey-txt"><strong>{inst.strong}</strong>{inst.rest}</div>
          </div>
        ))}
        <div className="mob-journey-end">End of Series · MDC HR Buddy Training</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.35)',marginBottom:14,lineHeight:1.55,textAlign:'center',fontStyle:'italic'}}>That's what AI capable actually looks like.</div>
        <button className="mob-journey-cta" onClick={()=>window.location.href='index.html'}>← Back to Unit 1</button>
        <div style={{marginTop:10,textAlign:'center',fontSize:11,color:'rgba(255,255,255,.25)',cursor:'pointer'}} onClick={onReset}>Restart Unit 3</div>
      </div>
    );
  }

  return(
    <div className="mob-root">
      <div className="mob-hdr" style={{background:isEod?'#070c18':'#0d1117',transition:'background 1s'}}>
        <img src="assets/mdc-logo.png" style={{width:22,height:22,flexShrink:0}} alt="MDC"/>
        <div className="mob-hdr-title">Unit 3 of 3 — The Audit Trail</div>
        <div className="mob-prog-dots" style={{marginRight:8}}>
          <div className="mob-prog-dot done"/><div className="mob-prog-dot done"/>
          <div className={`mob-prog-dot ${screen!=='scene'&&screen!=='deciding1'?'on':''}`}/>
        </div>
        <div className="mob-hdr-time">{clockTime}</div>
      </div>
      <div className="mob-body">

        {(screen==='scene'||screen==='deciding1')&&(<>
          <div className="mob-label">Marcus L., HRBP · 8:47 AM</div>
          <div className="mob-card">
            <div className="mob-card-hdr" style={{background:'#201f42',color:'#fff'}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:'#4338ca',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff'}}>ML</div>
              Marcus L., HRBP · Wed, Oct 22
            </div>
            <div className="mob-msg">
              <div className="mob-av" style={{background:'#4338ca'}}>ML</div>
              <div style={{flex:1}}>
                <span className="mob-msg-who">Marcus L., HRBP</span><span className="mob-msg-when">8:47 AM</span>
                <div className="mob-bubble key">Agenda: Review HR Buddy's proposed termination workflow for Operations. I've been testing it and it's ready. Want to get Legal's sign-off so we can roll it out to the other HRBPs this week. Should be a quick call.</div>
              </div>
            </div>
            <div style={{padding:'8px 12px',background:'#fef9f0',borderTop:'1px solid #fde68a',display:'flex',gap:6,alignItems:'flex-start'}}>
              <span style={{fontSize:13}}>📅</span>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'#92400e'}}>Termination Workflow Review · 9:30 AM</div>
                <div style={{fontSize:10,color:'#6b7280',marginTop:2}}>Starting in 12 minutes · Jamie, Marcus, Legal</div>
              </div>
            </div>
          </div>
          <div className="mob-label">Marcus's Workflow Document</div>
          <div className="mob-wf-card">
            <div className="mob-wf-hdr">📄 Termination Workflow — HR Buddy Pilot.docx</div>
            <div className="mob-wf-body">
              {[
                {n:'Step 1',text:'HRBP uploads case history, performance notes, and disciplinary documentation to HR Buddy.',problem:false},
                {n:'Step 2',text:'HR Buddy generates a termination summary — documented issues, intervention timeline, recommended rationale.',problem:false},
                {n:'Step 3',text:'HRBP reviews the summary and sends it to the manager for approval.',problem:true},
                {n:'Step 4',text:'Manager approves. HR processes the termination.',problem:false},
              ].map((s,i)=>(
                <div key={i} className={`mob-wf-step ${s.problem?'problem':''}`}>
                  <div className="mob-wf-step-num">{s.n}{s.problem?' — something feels wrong here':''}</div>
                  {s.text}
                </div>
              ))}
            </div>
          </div>
          <div className="mob-cf-card">
            <div className="mob-cf-ttl">Carried from Unit 2</div>
            {['MDC policy: no AI accesses employee records without audit logging.','HR Buddy audit logging went live Oct 20.','Termination workflow review — today.'].map((c,i)=>(
              <div key={i} className="mob-cf-item"><div className="mob-cf-dot"/>{c}</div>
            ))}
          </div>
          {screen==='scene'&&<button style={{background:'#2563eb',color:'#fff',border:'none',fontSize:14,fontWeight:600,padding:'13px',borderRadius:4,cursor:'pointer'}} onClick={onBeginDecide}>What do you do? →</button>}
          {screen==='deciding1'&&(
            <div className="mob-d-tiles">
              {[
                {k:'A',cls:'a',main:'Go into the meeting and raise concerns there.',sub:'Let Legal catch it'},
                {k:'B',cls:'b',main:'Message Marcus before the meeting.',sub:'Flag it to him first, privately'},
                {k:'C',cls:'c',main:'Test the workflow in HR Buddy first.',sub:'Use fictional data — see what it actually produces'},
              ].map(o=>(
                <div key={o.k} className={`mob-d-tile ${o.cls}`} onClick={()=>onNode1Choose(o.k)}>
                  <div className="mob-d-tile__key">{o.k}</div>
                  <div><div className="mob-d-tile__main">{o.main}</div><div className="mob-d-tile__sub">{o.sub}</div></div>
                </div>
              ))}
            </div>
          )}
        </>)}

        {screen==='testing'&&(
          <div className="mob-testing">
            <div className="mob-testing-hdr">🧪 HR Buddy test — fictional employee, no real PII</div>
            <div className="mob-testing-body">
              <div className="mob-testing-output"><strong>Performance Summary:</strong> Three documented incidents. PIP initiated Oct 1, not met by Oct 14.<br/><br/><strong>Recommended action:</strong> The documented pattern meets the threshold for termination. Case history supports a defensible termination rationale. Recommend proceeding.</div>
              <div className="mob-testing-flag">⚠ <strong>This is a recommendation, not a summary.</strong> HR Buddy drew conclusions. A manager approving this workflow is endorsing an AI decision — not independently reviewing the facts.</div>
              <button style={{background:'#1e3a6b',color:'#fff',border:'none',fontSize:13,fontWeight:600,padding:'10px',borderRadius:3,cursor:'pointer',width:'100%'}} onClick={onTestContinue}>Send note to Marcus → Continue to 9:30am meeting</button>
            </div>
          </div>
        )}

        {screen==='meeting'&&node1Choice&&(
          <div className="mob-meeting-card">
            <div className="mob-meeting-hdr">📹 Termination Workflow Review · 9:30 AM</div>
            <div className="mob-meeting-participants">
              {PARTICIPANTS_U3.map(p=>(
                <div key={p.id} className="mob-participant">
                  <div className="mob-participant-av" style={{background:p.color,border:shown[shown.length-1]?.speaker===p.id?'2px solid #2563eb':'2px solid transparent'}}>{p.id}</div>
                  <div className="mob-participant-name">{p.name.split(' ')[0]}</div>
                </div>
              ))}
            </div>
            <div className="mob-transcript">
              {shown.map((l,i)=>{
                const p=speakerMap[l.speaker];
                return(<div key={i} className="mob-tl"><div className="mob-tl-who" style={{color:l.color}}>{p?.name||l.speaker}</div><div className="mob-tl-text">"{l.text}"</div></div>);
              })}
            </div>
            <div className="mob-meeting-footer">
              {!isLastLine&&<button className="mob-meeting-btn" onClick={onAdvanceMeeting}>Next →</button>}
              {isLastLine&&<button className="mob-meeting-btn end" onClick={onEndMeeting}>End meeting →</button>}
            </div>
          </div>
        )}

        {screen==='followup'&&(
          <>
            <div className="mob-followup">
              <div className="mob-followup-hdr">💬 Marcus L., HRBP · 11:14 AM</div>
              <div className="mob-followup-body">
                <div style={{fontSize:13,color:'#374151',lineHeight:1.55}}>Thanks for the catch this morning. Before we roll this out — what do we need to document so we have a clean audit trail if a termination using this workflow ever gets challenged?</div>
                <div className="mob-followup-prompt">What does a defensible audit trail look like?</div>
                <div className="mob-followup-sub">This is the question you've been building toward for two weeks.</div>
              </div>
            </div>
            <div className="mob-d-tiles">
              {[
                {k:'D',cls:'d',main:"Capture what HR Buddy produced.",sub:'Log the AI\'s output and timestamps'},
                {k:'E',cls:'e',main:"Capture the manager's independent review.",sub:"Document that the human reviewed source docs"},
                {k:'F',cls:'f',main:"Capture both — AI output and independent human review, in sequence.",sub:'The full chain, separately documented'},
              ].map(o=>(
                <div key={o.k} className={`mob-d-tile ${o.cls}`} onClick={()=>onNode2Choose(o.k)}>
                  <div className="mob-d-tile__key">{o.k}</div>
                  <div><div className="mob-d-tile__main">{o.main}</div><div className="mob-d-tile__sub">{o.sub}</div></div>
                </div>
              ))}
            </div>
          </>
        )}

        {screen==='debrief'&&db&&(
          <div className="mob-debrief">
            <div className="mob-db-eyebrow">What just happened · Unit 3 of 3</div>
            <div className="mob-db-heading">{db.heading}</div>
            {summary&&<div className="mob-db-summary"><strong>The 9:30am meeting:</strong> {summary}</div>}
            <div className="mob-db-body">{db.body}</div>
            <div className="mob-db-reinf">{db.reinf}</div>
            <button className="mob-cont-btn" onClick={onJourney}>Jamie's Journey →</button>
          </div>
        )}

      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [screen,setScreen]=useState('transition');
  const [node1Choice,setNode1Choice]=useState(null);
  const [node2Choice,setNode2Choice]=useState(null);
  const [dialogueIdx,setDialogueIdx]=useState(0);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=768);
  const stageRef=useRef(null);
  const deskRef=useRef(null);

  useEffect(()=>{
    function scale(){
      if(!stageRef.current||!deskRef.current)return;
      const s=Math.min(stageRef.current.clientWidth/1440,stageRef.current.clientHeight/900);
      deskRef.current.style.transform=`scale(${s})`;
    }
    function checkMobile(){setIsMobile(window.innerWidth<=768)}
    scale();checkMobile();
    window.addEventListener('resize',scale);window.addEventListener('resize',checkMobile);
    return()=>{window.removeEventListener('resize',scale);window.removeEventListener('resize',checkMobile)};
  },[]);

  function handleNode1Choose(k){
    setNode1Choice(k);
    if(k==='C'){setScreen('testing');}
    else{setDialogueIdx(0);setScreen('meeting');}
  }
  function handleTestContinue(){setDialogueIdx(0);setScreen('meeting')}
  function handleAdvanceMeeting(){const d=MEETING[node1Choice];if(dialogueIdx<d.length-1)setDialogueIdx(i=>i+1)}
  function handleEndMeeting(){setScreen('followup')}
  function handleNode2Choose(k){setNode2Choice(k);setScreen('debrief')}
  function handleJourney(){setScreen('journey')}
  function handleReset(){setScreen('scene');setNode1Choice(null);setNode2Choice(null);setDialogueIdx(0)}

  const isEod=screen==='debrief'||screen==='journey';
  const dimCls=screen==='deciding1'?'dimmed':screen==='testing'?'dimmed':isEod?'eod-dim':'';
  const meetingActive=screen==='meeting';
  const showTest=screen==='testing'&&node1Choice==='C';
  const clockTime=meetingActive?'9:30 AM':screen==='followup'?'11:14 AM':isEod?'11:30 AM':'9:15 AM';
  const showFollowup=screen==='followup'||isEod;

  if(isMobile&&screen!=='transition'&&screen!=='opening'){
    return(
      <div className="stage" ref={stageRef}>
        <MobileLayout
          screen={screen} node1Choice={node1Choice} node2Choice={node2Choice} dialogueIdx={dialogueIdx}
          onBeginDecide={()=>setScreen('deciding1')} onNode1Choose={handleNode1Choose}
          onTestContinue={handleTestContinue} onAdvanceMeeting={handleAdvanceMeeting}
          onEndMeeting={handleEndMeeting} onNode2Choose={handleNode2Choose}
          onJourney={handleJourney} onReset={handleReset}
        />
      </div>
    );
  }

  return(
    <div className="stage" ref={stageRef}>
      {/* ── OPENING SCREEN ── */}
      {screen==='opening'&&(
        <div className="opening-screen">
          <div className="opening-card">
            <div className="op-eyebrow">Unit 3 of 3 — The Audit Trail</div>
            <div className="op-body">
              <p>It's October 22nd. 9:15am.</p>
              <p>You are Jamie, an HR Coordinator at Meridian Dynamics Corporation. One week ago you were scrambling to explain what HR Buddy had accessed and why there was no record of it. Today is different.</p>
              <p>HR Buddy has audit logging. IT completed the configuration two days ago. Legal signed off on the new deployment policy yesterday: no AI system accesses employee records at MDC without configured audit logging, a documented human review checkpoint, and a disclosure statement in the relevant employee communication.</p>
              <p>You feel cautiously confident. The system is better than it was.</p>
              <p>Your calendar has one item this morning: <em>"Termination Workflow Review — HR Buddy Pilot — Jamie, Marcus (HRBP), Legal — 9:30am"</em></p>
              <p>Marcus is the HR Business Partner for MDC's Operations division. He's been using HR Buddy informally for two weeks — summarizing performance documentation, drafting talking points for difficult conversations, pulling case histories from HelpGate. He's enthusiastic about it. He told you last week it was saving him three hours a day.</p>
              <p>Before the 9:30am meeting you open the agenda Marcus sent at 8:47am:</p>
            </div>
            <div className="op-quote">"Agenda: Review HR Buddy's proposed termination workflow for Operations. I've been testing it and it's ready. Want to get Legal's sign-off so we can roll it out to the other HRBPs this week. Should be a quick call."</div>
            <div className="op-body">
              <p>You open the workflow document Marcus attached. The proposed workflow has four steps:</p>
            </div>
            <div className="op-files">
              <div style={{fontWeight:600,marginBottom:10,fontSize:13,color:'#1e3a6b'}}>Marcus's Proposed Termination Workflow</div>
              <div className="op-files-row"><div className="op-file-badge" style={{background:'#4b5563',fontSize:9}}>1</div><div><strong>HRBP uploads</strong> the employee's HelpGate case history, performance notes from CorePeople360, and any disciplinary documentation to HR Buddy.</div></div>
              <div className="op-files-row"><div className="op-file-badge" style={{background:'#4b5563',fontSize:9}}>2</div><div><strong>HR Buddy generates</strong> a termination summary — a structured document covering the documented performance issues, the timeline of interventions, and a recommended termination rationale.</div></div>
              <div className="op-files-row"><div className="op-file-badge" style={{background:'#4b5563',fontSize:9}}>3</div><div><strong>HRBP reviews</strong> the summary and sends it to the employee's manager for approval.</div></div>
              <div className="op-files-row"><div className="op-file-badge" style={{background:'#4b5563',fontSize:9}}>4</div><div><strong>Manager approves.</strong> HR processes the termination.</div></div>
            </div>
            <div className="op-body"><p>You read it twice. Something is wrong. You can feel it before you can name it.</p></div>
            <div className="op-cta">The meeting starts in 12 minutes. What do you do?</div>
            <button className="op-btn" onClick={()=>setScreen('scene')}>Enter the scenario →</button>
          </div>
        </div>
      )}
      <div className={`desktop ${isEod?'eod':''} ${screen==='journey'?'journey-bg':''}`} ref={deskRef}>

        {screen==='transition'&&<TransitionScreen onDone={()=>setScreen('opening')}/>}

        <div className="prog">
          <img src="assets/mdc-logo.png" style={{width:18,height:18,opacity:.9,flexShrink:0}} alt="MDC"/>
          <div className="prog-txt">Unit 3 of 3 — The Audit Trail</div>
          <div className="prog-dots">
            <div className="prog-dot done"/><div className="prog-dot done"/>
            <div className={`prog-dot ${screen!=='scene'&&screen!=='deciding1'?'on':''}`}/>
          </div>
        </div>

        <TeamsWin dimCls={dimCls} showFollowup={showFollowup}/>
        <WorkflowWin dimCls={dimCls}/>
        <CFCard dimCls={dimCls}/>
        <HRBuddySidebar dimCls={meetingActive||isEod?'eod-dim':''} showTest={showTest}/>
        <Toasts dimCls={dimCls}/>

        <div style={{position:'absolute',top:34,left:10,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:5,borderRadius:3,cursor:'pointer',opacity:dimCls?.15:1,transition:'opacity .5s',pointerEvents:dimCls?'none':'auto'}}>
          <div style={{fontSize:20}}>🗑</div>
          <div style={{fontSize:9,color:'rgba(255,255,255,.8)',textShadow:'0 1px 2px rgba(0,0,0,.6)'}}>Recycle Bin</div>
        </div>

        <Taskbar time={clockTime}/>

        {screen==='scene'&&(
          <div style={{position:'absolute',bottom:60,left:'50%',transform:'translateX(-50%)',zIndex:50}}>
            <button onClick={()=>setScreen('deciding1')} style={{background:'#2563eb',color:'#fff',border:'none',fontSize:13,fontWeight:600,padding:'10px 24px',borderRadius:3,cursor:'pointer',boxShadow:'0 4px 16px rgba(37,99,235,.4)'}}>
              What do you do? →
            </button>
          </div>
        )}

        {screen==='deciding1'&&<Node1Overlay onChoose={handleNode1Choose}/>}
        {screen==='testing'&&<TestingInterstitial onContinue={handleTestContinue}/>}
        {screen==='meeting'&&node1Choice&&<TeamsMeeting node1Choice={node1Choice} onDone={handleEndMeeting}/>}
        {screen==='followup'&&<FollowupOverlay onChoose={handleNode2Choose}/>}
        {screen==='debrief'&&<DebriefPanel node1Choice={node1Choice} node2Choice={node2Choice} onJourney={handleJourney}/>}
        {screen==='journey'&&<JameysJourney onRestart={handleReset}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
